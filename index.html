<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Peanut Darkness - 영원의 기록과 빛</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body { 
        margin: 0; padding: 0; background-color: #000; overflow: hidden; 
        font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; 
        touch-action: none; overscroll-behavior: none;
        user-select: none; -webkit-user-select: none;
    }
    input { user-select: auto; -webkit-user-select: auto; }
    
    @keyframes titleGlow { 0% { text-shadow: 0 0 10px rgba(212, 160, 23, 0.2); } 50% { text-shadow: 0 0 30px rgba(212, 160, 23, 0.8), 0 0 60px rgba(212, 160, 23, 0.5); } 100% { text-shadow: 0 0 10px rgba(212, 160, 23, 0.2); } }
    .ui-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; gap: 15px; color: white; background: rgba(10, 10, 15, 0.95); padding: 50px; border-radius: 20px; border: 1px solid #333; z-index: 10;  box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
    h1 { font-size: 55px; color: #d4a017; margin: 0 0 35px 0; letter-spacing: 10px; animation: titleGlow 3s ease-in-out infinite alternate; }
    
    .input-group { display: flex; flex-direction: column; width: 280px; gap: 8px; }
    .input-group label { font-size: 14px; color: #888; margin-left: 5px; }
    input { padding: 14px; border-radius: 10px; border: 1px solid #444; background: #111; color: white; font-size: 16px; width: 100%; box-sizing: border-box; text-align: center;}
    
    .name-gen-box { display: flex; gap: 5px; width: 100%; }
    .name-gen-box input { flex-grow: 1; }
    .name-gen-box button { margin: 0; padding: 0 15px; width: auto; font-size: 20px; border-radius: 10px; background: #333; color: #d4a017; border: 1px solid #444; cursor: pointer; transition: 0.3s; }
    .name-gen-box button:hover { background: #444; color: #ffcc33; }

    .btn-start { background: #d4a017; color: #000; font-weight: bold; padding: 18px 45px; border-radius: 10px; border: none; font-size: 20px; cursor: pointer; margin-top: 20px; width: 280px; }
    .btn-start:hover { background: #ffcc33; transform: scale(1.02); }
    
    #dev-ui { position: absolute; top: 20px; left: 20px; background: rgba(15, 15, 20, 0.9); border: 1px solid #d4a017; padding: 20px; border-radius: 12px; color: white; display: none; flex-direction: column; gap: 15px; z-index: 100; }
    .answer-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: none; gap: 10px; z-index: 20; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 50px; border: 1px solid #d4a017; }
    .answer-container input { padding: 8px 20px; border-radius: 20px; border: none; background: #111; color: white; width: 150px; text-align: center; }
    .answer-container button { padding: 8px 20px; margin-top: 0; width: auto; font-size: 14px; border-radius: 20px; background: #d4a017; color: black; font-weight:bold; cursor:pointer; border:none;}
    
    #mobile-ui { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 50; }
    .action-btn { position: absolute; width: 65px; height: 65px; border-radius: 50%; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.4); color: white; font-size: 22px; font-weight: bold; display: flex; justify-content: center; align-items: center; pointer-events: auto; touch-action: none; user-select: none; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    
    .action-btn:active { background: rgba(255,255,255,0.6); color: black; }
    
    .joystick-knob { position: absolute; top: 50%; left: 50%; width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.3); transform: translate(-50%, -50%); pointer-events: none; }
    
    #chat-ui { position: absolute; top: 280px; right: 30px; width: 220px; height: 300px; display: none; flex-direction: column; gap: 5px; z-index: 45; }
    #chat-messages { flex-grow: 1; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; font-size: 13px; color: #eee; display: flex; flex-direction: column; gap: 4px; scrollbar-width: none; }
    #chat-messages::-webkit-scrollbar { display: none; }
    #chat-input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 5px; padding: 8px; color: white; font-size: 13px; outline: none; }
    #chat-input:focus { background: rgba(255,255,255,0.2); }
    .chat-msg { line-height: 1.4; word-break: break-all; }
    .chat-sender { font-weight: bold; margin-right: 4px; }
  
    #game-over-ui { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 5, 10, 0.95); z-index: 100; flex-direction: column; justify-content: center; align-items: center; gap: 20px; color: white; text-align: center; }
    .go-title { font-size: 50px; color: #d4a017; letter-spacing: 5px; text-shadow: 0 0 20px rgba(212, 160, 23, 0.5); margin-bottom: 10px; }
    .go-desc { font-size: 22px; color: #ddd; line-height: 1.8; }
    .go-record { font-size: 20px; color: #00FFFF; margin-top: 15px; font-weight: bold; }
    .btn-return { background: #222; color: #d4a017; padding: 15px 40px; font-size: 18px; border-radius: 10px; border: 1px solid #d4a017; cursor: pointer; margin-top: 40px; transition: 0.3s; }
    .btn-return:hover { background: #d4a017; color: black; transform: scale(1.05); }
    
    .fs-btn { position: absolute; top: 20px; right: 20px; width: 50px; height: 50px; border-radius: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; font-size: 24px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 110; pointer-events: auto; transition: 0.2s; }
    .fs-btn:active { background: rgba(255,255,255,0.4); }
  
    .joystick-zone { position: absolute; bottom: 55px; left: 30px; width: 180px; height: 180px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15); pointer-events: auto; touch-action: none; }
    .btn-z { bottom: 55px; right: 110px; }
    .btn-x { bottom: 135px; right: 30px; }
  </style>
</head>
<body>

  <div id="lobby-ui" class="ui-container">
    <h1>Peanut Darkness</h1>
    
    <div class="input-group">
      <label>방 코드 (동료와 같은 코드를 입력하세요)</label>
      <div class="name-gen-box">
        <input type="text" id="roomCode" placeholder="예: 1234" maxlength="4">
        <button onclick="generateRandomRoomCode()" title="새로운 방 코드 발급">🔄</button>
      </div>
    </div>
    
    <div class="input-group">
      <label>탐험가의 이름</label>
      <div class="name-gen-box">
        <input type="text" id="pName" placeholder="당신의 이름을 새겨주세요">
        <button onclick="generateRandomName()" title="이름 짓기">🔄</button>
      </div>
    </div>
    
    <button class="btn-start" onclick="startGame()">어둠 속으로 뛰어들기</button>
  </div>

  <div id="dev-ui">
    <h3>🛠 창조주의 시선</h3>
    <button onclick="fullVision = !fullVision;" style="margin-bottom:10px; padding:8px; border-radius:5px; border:none; cursor:pointer;">맵 전체 밝히기 토글</button>
    <h4 style="margin: 5px 0; color: #aaa;">📚 문제 은행</h4>
    <ul id="wordBankList" style="list-style:none; padding:0; margin:0; max-height: 150px; overflow-y: auto; font-size:14px; width:100%;"></ul>
    <div style="display:flex; gap:5px; margin-top:10px;">
      <input type="text" id="devWordInput" placeholder="새 단어 추가" style="width: 120px; padding:8px; font-size:14px; border-radius:5px;">
      <button onclick="addWordToBank()" style="margin:0; padding:8px; font-size:14px; width:auto; border-radius:5px; cursor:pointer;">추가</button>
    </div>
  </div>

  <div id="mobile-ui">
    <div class="fs-btn" onclick="toggleFullScreen()" title="전체 화면">⛶</div>
    <div id="joystick-zone" class="joystick-zone">
      <div id="joystick-knob" class="joystick-knob"></div>
    </div>
    <div id="btn-z" class="action-btn btn-z">Z</div>
    <div id="btn-x" class="action-btn btn-x">X</div>
  </div>

  <div id="chat-ui">
    <div id="chat-messages"></div>
    <div style="display: flex; gap: 5px;">
      <input type="text" id="chat-input" placeholder="메시지를 입력하세요..." onfocus="isChatting=true" onblur="isChatting=false" style="width: 100%;">
      <button id="chat-send-btn" style="background: #d4a017; color: #000; border: none; border-radius: 5px; padding: 0 12px; font-weight: bold; cursor: pointer; white-space: nowrap;">전송</button>
    </div>
  </div>

  <div id="game-over-ui">
    <div class="go-title">진실이 밝혀졌습니다</div>
    <div id="go-text" class="go-desc"></div>
    <div id="go-record" class="go-record"></div>
    <button class="btn-return" onclick="location.reload()">어둠 속으로 다시 흩어지기 (대기실)</button>
  </div>

  <div id="answer-ui" class="answer-container">
    <input type="text" id="ansInput" placeholder="진실의 이름을 부르세요">
    <button onclick="submitAnswer()">외치기</button>
  </div>

  <script>
    const socket = io(); 
    
    let gameState = 'LOBBY'; 
    let serverWorld = { angle: 0, targetWord: "", players: {}, items: [], enemies: [], meteors: [], fItems: [], fMarks: [], serverTime: Date.now() };
    let collisionLayer, collisionPixels;
    let lastWord = "";
    let needCollisionUpdate = false;
    let sysMessages = [];
    let isChatting = false;
    
    const MAP_RADIUS = 4000; const MAP_CENTER = 4000; const MAP_SIZE = MAP_RADIUS * 2;
    const COLLISION_SCALE = 0.1;
    
    let myRoom = ""; 
    let playerX = MAP_CENTER; let playerY = MAP_CENTER + MAP_RADIUS - 80; 
    let playerDir = -Math.PI / 2; let targetDir = -Math.PI / 2;
    const playerSpeed = 7; const playerRadius = 12;
    
    let lanternOn = true;
    let battery = 100; const batteryDrain = 0.04;
    let currentFov = Math.PI / 8.8; const maxFov = Math.PI / 1.5;
    
    let fullVision = false; let devModeActive = false;
    let trail = []; let stepToggle = 1; let lastStepDistance = 0;
    
    const stRadius = 3200;
    const stations = [
      {x: MAP_CENTER + stRadius * Math.cos(-Math.PI/2), y: MAP_CENTER + stRadius * Math.sin(-Math.PI/2)},    
      {x: MAP_CENTER + stRadius * Math.cos(Math.PI/6), y: MAP_CENTER + stRadius * Math.sin(Math.PI/6)},      
      {x: MAP_CENTER + stRadius * Math.cos(5*Math.PI/6), y: MAP_CENTER + stRadius * Math.sin(5*Math.PI/6)}   
    ];

    const adjectives = ["활동적인", "조용한", "용감한", "소심한", "빛나는", "어두운", "지혜로운", "신비로운", "푸른", "붉은", "고독한", "다정한"];
    const nouns = ["달팽이", "올빼미", "고양이", "늑대", "여우", "까마귀", "그림자", "별빛", "바람", "여행자", "탐험가", "먼지"];
    
    function generateRandomRoomCode() {
        let num = Math.floor(Math.random() * 9000) + 1000;
        document.getElementById('roomCode').value = num.toString();
    }
    
    function generateRandomName() {
        let adj = adjectives[Math.floor(Math.random() * adjectives.length)];
        let noun = nouns[Math.floor(Math.random() * nouns.length)];
        document.getElementById('pName').value = `${adj} ${noun}`;
    }
    window.onload = () => { generateRandomName(); generateRandomRoomCode(); };

    socket.on('worldUpdate', (worldData) => {
        serverWorld = worldData;
        if (serverWorld.targetWord !== lastWord) {
            lastWord = serverWorld.targetWord;
            needCollisionUpdate = true; 
        }
    });

    socket.on('systemMessage', (msg) => {
        sysMessages.push({ text: msg.text, alpha: 255, y: window.innerHeight - 150 });
    });

    socket.on('receiveChat', (data) => {
      let msgBox = document.getElementById('chat-messages');
      let msgDiv = document.createElement('div');
      msgDiv.className = 'chat-msg';
      msgDiv.innerHTML = `<span class="chat-sender" style="color:${data.color}">${data.sender}:</span><span>${data.text}</span>`;
      msgBox.appendChild(msgDiv);
      msgBox.scrollTop = msgBox.scrollHeight;
    });

    function sendChatMessage() {
      let input = document.getElementById('chat-input');
      let val = input.value.trim();
      if (val) {
        socket.emit('sendChat', val);
        input.value = "";
      }
    }

    document.getElementById('chat-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendChatMessage();
    });

    let sendBtn = document.getElementById('chat-send-btn');
    if (sendBtn) {
        sendBtn.addEventListener('click', sendChatMessage);
        sendBtn.addEventListener('touchstart', (e) => { e.preventDefault(); sendChatMessage(); }, {passive: false});
    }

    socket.on('gameEnd', (data) => {
        gameState = 'GAME_OVER';
        
        if (document.getElementById('mobile-ui')) document.getElementById('mobile-ui').style.display = 'none';
        if (document.getElementById('chat-ui')) document.getElementById('chat-ui').style.display = 'none';
        if (document.getElementById('answer-ui')) document.getElementById('answer-ui').style.display = 'none';
        if (document.getElementById('dev-ui')) document.getElementById('dev-ui').style.display = 'none';
        
        document.getElementById('go-text').innerHTML = 
            `누군가 깊은 심연 속에서 마침내 답을 찾아냈습니다.<br><br>` +
            `<span style="color:#d4a017; font-size:36px; font-weight:bold; letter-spacing: 3px;">[ ${data.word} ]</span><br><br>` +
            `빛을 밝힌 탐험가: <b style="color:#fff;">${data.winner}</b><br>` +
            `소요 시간: ${data.time}초`;
            
        if (data.isNewRecord) {
            document.getElementById('go-record').innerHTML = `✨ 눈부신 통찰입니다! 새로운 신기록이 쓰였습니다! ✨`;
        } else {
            document.getElementById('go-record').innerHTML = `🏆 이 단어의 최고 기록: ${data.bestRecord.name} (${data.bestRecord.time}초)`;
        }
        
        document.getElementById('game-over-ui').style.display = 'flex';
        cursor();
    });

    socket.on('wordBankUpdate', (words) => {
      let ul = document.getElementById('wordBankList');
      if(!ul) return;
      ul.innerHTML = "";
      words.forEach(w => {
        let li = document.createElement('li');
        li.style.cssText = "display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; background:rgba(0,0,0,0.5); padding:5px; border-radius:5px;";
        li.innerHTML = `<span>${w}</span> 
                        <div>
                          <button onclick="forceWord('${w}')" style="padding:2px 5px; font-size:12px; margin:0; width:auto; background:#4CAF50; color:white; border-radius:3px; border:none; cursor:pointer;">출제</button>
                          <button onclick="deleteWord('${w}')" style="padding:2px 5px; font-size:12px; margin:0; width:auto; background:#f44336; color:white; border-radius:3px; border:none; cursor:pointer;">삭제</button>
                        </div>`;
        ul.appendChild(li);
      });
    });

    function submitAnswer() {
      let ans = document.getElementById('ansInput').value;
      if(ans) {
        socket.emit('submitAnswer', ans);
        document.getElementById('ansInput').value = "";
      }
    }

    socket.on('itemCollected', () => {
        currentFov = min(maxFov, currentFov + Math.PI / 8); 
        battery = min(100, battery + 10);
    });

    // 어둠을 담당할 캔버스 변수 선언
    let darknessLayer;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      darknessLayer = createGraphics(windowWidth, windowHeight);
      noCursor();
    }

    function initCollisionLayer(word) {
      if(collisionLayer) collisionLayer.remove();
      collisionLayer = createGraphics(MAP_SIZE * COLLISION_SCALE, MAP_SIZE * COLLISION_SCALE);
      collisionLayer.pixelDensity(1); collisionLayer.background(0); collisionLayer.fill(255);
      collisionLayer.textAlign(CENTER, CENTER); collisionLayer.textSize(3500 * COLLISION_SCALE);
      collisionLayer.text(word, collisionLayer.width / 2, collisionLayer.height / 2);
      collisionLayer.loadPixels(); collisionPixels = collisionLayer.pixels;
    }

    function startGame() {
      const name = document.getElementById('pName').value.trim();
      const room = document.getElementById('roomCode').value.trim();
      
      if(!name || !room) { alert("방 코드와 이름을 모두 입력해주세요."); return; }
      
      myRoom = room;
      socket.emit('join', { name: name, room: room });
      
      gameState = 'PLAY';
      document.getElementById('lobby-ui').style.display = 'none';
      if (!devModeActive) noCursor(); 
      document.getElementById('answer-ui').style.display = 'flex';
      
      const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
      if (isTouchDevice) document.getElementById('mobile-ui').style.display = 'block';
      document.getElementById('chat-ui').style.display = 'flex';
      
      setTimeout(() => {
        if (document.activeElement) document.activeElement.blur();
        let cvs = document.querySelector("canvas");
        if (cvs) { cvs.setAttribute('tabindex', '0'); cvs.focus(); } 
        else { window.focus(); }
      }, 100);
    }
    
    function mousePressed() {
      if (gameState === 'PLAY' && document.activeElement.tagName !== 'INPUT') {
        if (document.activeElement) document.activeElement.blur();
      }
    }

    function addWordToBank() {
      let w = document.getElementById('devWordInput').value.trim();
      if(w) socket.emit('addWord', w);
      document.getElementById('devWordInput').value = "";
    }
    function deleteWord(w) { socket.emit('deleteWord', w); }
    function forceWord(w) { socket.emit('forceWord', w); }

    let activeKeys = {};
    let joyDx = 0; let joyDy = 0;

    window.addEventListener('keydown', (e) => {
      if (e.altKey && (e.key === 'a' || e.key === 'A')) {
        if (!devModeActive) {
          let pwd = prompt("창조주의 권능을 깨우기 위한 암호를 입력하세요:");
          if (pwd === "cjdrP119!") {
            devModeActive = true; document.getElementById('dev-ui').style.display = 'flex'; cursor();
          } else if (pwd !== null) { alert("자격이 증명되지 않았습니다. 어둠 속으로 돌아가세요."); }
        } else {
          devModeActive = false; document.getElementById('dev-ui').style.display = 'none';
          if (gameState === 'PLAY') noCursor();
        }
      }
      
      if (document.activeElement.tagName === 'INPUT') return;
      if (e.key === 'z' || e.key === 'Z') toggleLantern();
      if (e.key === 'x' || e.key === 'X') useFluorescent();
      if (!e.repeat) activeKeys[e.key.toLowerCase()] = true;
    });

    window.addEventListener('keyup', (e) => {
      if (document.activeElement.tagName === 'INPUT') return;
      activeKeys[e.key.toLowerCase()] = false;
    });

    window.addEventListener('blur', () => {
      activeKeys = {}; joyDx = 0; joyDy = 0;
    });

    function toggleFullScreen() {
      if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(err => {
              sysMessages.push({ text: '전체 화면 전환에 실패했습니다.', alpha: 255, y: window.innerHeight - 150 });
          });
      } else {
        if (document.exitFullscreen) document.exitFullscreen();
      }
    }

    function toggleLantern() { if (gameState === 'PLAY') lanternOn = !lanternOn; }
    
    function useFluorescent() {
      if (gameState === 'PLAY') {
          let me = serverWorld.players[socket.id];
          if (me && me.fCount > 0) {
              socket.emit('useFluorescent', { x: playerX, y: playerY });
          } else if (me && me.fCount === 0) {
              sysMessages.push({ text: '형광물질이 없습니다. 운석이 떨어진 곳을 찾으세요.', alpha: 255, y: window.innerHeight - 150 });
          }
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
        let joyZone = document.getElementById('joystick-zone');
        let joyKnob = document.getElementById('joystick-knob');
        let joyActive = false; let joyTouchId = null;
        let joyCenterX = 0; let joyCenterY = 0;

        function updateJoystick(touch) {
            let rect = joyZone.getBoundingClientRect();
            joyCenterX = rect.left + rect.width / 2;
            joyCenterY = rect.top + rect.height / 2;
            
            let dx = touch.clientX - joyCenterX;
            let dy = touch.clientY - joyCenterY;
            let distance = Math.hypot(dx, dy);
            let maxDist = 60; 

            if (distance > maxDist) {
                dx = (dx / distance) * maxDist;
                dy = (dy / distance) * maxDist;
            }

            joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            joyDx = dx / maxDist;
            joyDy = dy / maxDist;
        }

        function stopJoystick(e) {
            if (joyActive) {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === joyTouchId) {
                        joyActive = false; joyTouchId = null;
                        joyDx = 0; joyDy = 0;
                        joyKnob.style.transform = `translate(-50%, -50%)`;
                        break;
                    }
                }
            }
        }

        joyZone.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            if (!joyActive) {
                let touch = e.changedTouches[0];
                joyActive = true; joyTouchId = touch.identifier;
                updateJoystick(touch);
            }
        }, {passive: false});

        joyZone.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (joyActive) {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === joyTouchId) {
                        updateJoystick(e.changedTouches[i]);
                        break;
                    }
                }
            }
        }, {passive: false});

        joyZone.addEventListener('touchend', stopJoystick);
        joyZone.addEventListener('touchcancel', stopJoystick);

        document.getElementById('btn-z').addEventListener('touchstart', (e) => { e.preventDefault(); toggleLantern(); }, {passive: false});
        document.getElementById('btn-x').addEventListener('touchstart', (e) => { e.preventDefault(); useFluorescent(); }, {passive: false});
    });
    
    function draw() {
      if (needCollisionUpdate) {
        initCollisionLayer(lastWord);
        needCollisionUpdate = false;
      }
      if (gameState === 'LOBBY') { 
        background(5, 5, 12); 
        let t = frameCount * 0.003;
        for(let i = 0; i < 80; i++) {
            let x = noise(i * 0.1, t) * width;
            let y = noise(i * 0.1 + 100, t) * height;
            let alpha = noise(i * 0.1 + 200, t * 2) * 200;
            let size = noise(i * 0.1 + 300, t) * 4 + 1;
            noStroke(); fill(212, 160, 23, 40); circle(x, y, size * 3); fill(212, 160, 23, alpha); circle(x, y, size);
        }
        return; 
      }
      background(10, 10, 15); 
      
      if (lanternOn) { battery -= batteryDrain; if (battery < 0) battery = 0; }
      let flickerMod = (battery < 20) ? map(sin(frameCount * map(battery, 20, 0, 0.5, 4.0)), -1, 1, 0.1, 1.0) : 1.0;
      let lightRadius = lanternOn ? max(40, map(battery, 0, 100, 80, 900) * flickerMod) : 0;

      resolveCollision();
      
      if (gameState === 'PLAY' && document.activeElement.tagName !== 'INPUT') {
          handleInput();
      }
      socket.emit('move', { x: playerX, y: playerY, dir: playerDir, lantern: lanternOn });

      push(); translate(width / 2 - playerX, height / 2 - playerY);
      drawGridAndBoundary(); drawStations(); drawItems(); drawFItems(); 
      
      push(); translate(MAP_CENTER, MAP_CENTER); rotate(serverWorld.angle); 
      fill(255); noStroke(); textAlign(CENTER, CENTER); textSize(3500); text(serverWorld.targetWord, 0, 0); 
      pop();
      
      drawEnemiesBodies();
      pop(); 

      if (!fullVision) drawProperLighting(flickerMod, lightRadius);

      push(); translate(width / 2 - playerX, height / 2 - playerY);
      drawTail(); drawFootprints(); drawMeteors(); drawEnemiesEyes(); drawOtherPlayers(); 
      pop();

      let playerPulse = map(sin(frameCount * 0.1), -1, 1, 0, 4);
      let myData = serverWorld.players[socket.id]; 
      fill(255, 230, 150, 40); noStroke(); circle(width / 2, height / 2, playerRadius * 3); 
      fill(myData ? myData.color : '#ffffff'); 
      circle(width / 2, height / 2, playerRadius * 2 + playerPulse);
      fill(255); circle(width / 2, height / 2, playerRadius); 
      
      drawRealtimeMinimap(lightRadius); drawUI();
    }

    function drawOtherPlayers() {
      for (let id in serverWorld.players) {
        if (id === socket.id) continue;
        let op = serverWorld.players[id];
        fill(op.color || '#ffffff'); noStroke(); circle(op.x, op.y, playerRadius * 2);
        fill(255, 255, 255, 150); textSize(14); textAlign(CENTER); text(op.name, op.x, op.y - 20);
      }
    }

    function drawEnemiesBodies() {
      for (let e of serverWorld.enemies) {
        if (!e.active) continue;
        if (dist(playerX, playerY, e.x, e.y) < playerRadius + 15) { battery -= 5; if (battery < 0) battery = 0; }
        push(); translate(e.x, e.y);
        let pulse = map(sin(frameCount * 0.1 + e.x), -1, 1, -2, 2);
        fill(e.type === 'red' ? 'rgba(255, 30, 30, 0.2)' : 'rgba(30, 150, 255, 0.2)'); noStroke(); circle(0, 0, 45 + pulse); 
        fill(25, 20, 30); stroke(e.type === 'red' ? color(120, 20, 20) : color(20, 80, 150)); strokeWeight(2); 
        circle(0, 0, 30 + pulse);
        pop();
      }
    }

    function drawEnemiesEyes() {
      for (let e of serverWorld.enemies) {
        if (!e.active) continue;
        push(); translate(e.x, e.y); 
        rotate(e.wanderAngle); noStroke();
        let showEyes = fullVision || e.inLight || (e.type === 'blue'); 
        if (showEyes) {
          let eyeCol = e.type === 'red' ? color(255, 50, 50) : color(50, 200, 255);
          fill(eyeCol); ellipse(8, -6, 10, 5); ellipse(8, 6, 10, 5);
          fill(255); circle(10, -6, 2.5); circle(10, 6, 2.5); 
          fill(red(eyeCol), green(eyeCol), blue(eyeCol), 100); ellipse(-2, -6, 15, 3); ellipse(-2, 6, 15, 3);
        }
        pop();
      }
    }

    function drawItems() {
      for (let i = 0; i < serverWorld.items.length; i++) {
        let item = serverWorld.items[i];
        if (item.active) {
          if (dist(playerX, playerY, item.x, item.y) < 50) { socket.emit('collectItem', i); }
          let floatY = item.y + sin(frameCount * 0.05 + i) * 6;
          let scaleMod = map(sin(frameCount * 0.1 + i), -1, 1, 0.8, 1.2);
          push(); translate(item.x, floatY); 
          fill(255, 200, 50, 40); noStroke(); circle(0, 0, 35); 
          fill(255, 220, 100, 200); noStroke();
          let emberX = sin(frameCount * 0.08 + i * 10) * 18; let emberY = cos(frameCount * 0.1 + i * 10) * 18;
          fill(255, 220, 100, 180); noStroke(); circle(emberX, emberY, 3.5);
          scale(scaleMod); fill(255, 220, 100, 200); noStroke();
          beginShape(); vertex(0, -12); bezierVertex(6, -6, 10, 6, 0, 14); bezierVertex(-10, 6, -6, -6, 0, -12); endShape(CLOSE);
          fill(255, 255, 255, 255); circle(0, 6, 6); 
          pop();
        }
      }
    }

    function drawFItems() {
      if (!serverWorld.fItems) return;
      for (let fi of serverWorld.fItems) {
        if (dist(playerX, playerY, fi.x, fi.y) < 50) { socket.emit('collectFItem', fi.id); }
        let floatY = fi.y + sin(frameCount * 0.1) * 5;
        push(); translate(fi.x, floatY); rotate(frameCount * 0.03);
        noFill(); stroke(0, 255, 255, 120); strokeWeight(2); ellipse(0, 0, 35, 10);
        rotate(-frameCount * 0.06); ellipse(0, 0, 35, 10);
        fill(0, 255, 255, 40); noStroke(); circle(0, 0, 45); 
        fill(0, 200, 255, 200); stroke(255); strokeWeight(1.5);
        rotate(frameCount * 0.05); rectMode(CENTER); rect(0, 0, 18, 18); 
        fill(255); noStroke(); rect(0, 0, 6, 6); 
        pop();
      }
    }

    function drawFootprints() {
      if (!serverWorld.footprints) return;
      let now = serverWorld.serverTime || Date.now();
      for (let fp of serverWorld.footprints) {
        let age = now - fp.time;
        let alpha = map(age, 0, 12000, 200, 0); 
        if (alpha > 0) {
          push(); translate(fp.x, fp.y); rotate(fp.angle);
          fill(180, 220, 255, alpha); noStroke(); ellipse(0, 0, 14, 7); 
          pop();
        }
      }
    }

    // ✨ 겹쳐진 빛이 먹칠로 변하지 않도록 '지우개(erase)'의 섭리로 어둠을 깎아냅니다.
    function drawProperLighting(flickerMod, lightRadius) {
      if (!darknessLayer) darknessLayer = createGraphics(windowWidth, windowHeight);
      
      // 1. 도화지 전체를 단 1%의 빛도 없는 100% 완벽한 칠흑으로 덮습니다.
      darknessLayer.clear();
      darknessLayer.background(0);

      // 2. 수학적 구멍 뚫기를 버리고, 어둠을 투명하게 지워버리는 섭리를 시작합니다.
      darknessLayer.erase();
      darknessLayer.noStroke();
      darknessLayer.fill(255);

      if (lanternOn) {
        darknessLayer.arc(width/2, height/2, lightRadius*2, lightRadius*2, playerDir - currentFov/2, playerDir + currentFov/2, PIE);
      }
      darknessLayer.circle(width/2, height/2, 110 * flickerMod);

      for (let id in serverWorld.players) {
        if (id === socket.id) continue;
        let op = serverWorld.players[id];
        let sx = op.x - (playerX - width/2); let sy = op.y - (playerY - height/2);
        if (op.lantern) darknessLayer.arc(sx, sy, 1200, 1200, op.dir - currentFov/2, op.dir + currentFov/2, PIE);
        darknessLayer.circle(sx, sy, 110);
      }

      for (let s of stations) {
        let sx = s.x - (playerX - width/2); let sy = s.y - (playerY - height/2);
        if (sx > -500 && sx < width+500 && sy > -500 && sy < height+500) darknessLayer.circle(sx, sy, 700);
      }

      if (serverWorld.meteors) {
        for (let m of serverWorld.meteors) {
          let mx = m.x - (playerX - width/2); let my = m.y - (playerY - height/2);
          let age = serverWorld.serverTime - m.startTime;
          let mRad = map(age, 0, m.duration, 800, 0);
          if (mRad > 0) darknessLayer.circle(mx, my, mRad * 2);
        }
      }

      if (serverWorld.fMarks) {
        for (let mk of serverWorld.fMarks) {
          let mx = mk.x - (playerX - width/2); let my = mk.y - (playerY - height/2);
          darknessLayer.circle(mx, my, 700);
        }
      }
      darknessLayer.noErase(); // 지우기 종료

      // 3. 지워진 구멍(시야)이 뚫린 칠흑의 장막을 게임 화면 위에 씌웁니다.
      imageMode(CORNER);
      image(darknessLayer, 0, 0);

      // 4. 시야 구멍 위로 빛의 은은한 오라(그라데이션)를 덧씌워 따뜻함을 불어넣습니다.
      blendMode(ADD);
      let ctx = drawingContext;
      if (lanternOn) {
        let g = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, lightRadius);
        g.addColorStop(0, `rgba(255, ${map(battery, 0, 20, 100, 200)}, 100, 0.4)`); g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g; ctx.beginPath(); ctx.moveTo(width/2, height/2);
        ctx.arc(width/2, height/2, lightRadius, playerDir - currentFov/2, playerDir + currentFov/2); ctx.fill();
      }
      for (let id in serverWorld.players) {
        if (id === socket.id) continue;
        let op = serverWorld.players[id];
        if (op.lantern) {
          let screenX = op.x - (playerX - width/2); let screenY = op.y - (playerY - height/2);
          let g = ctx.createRadialGradient(screenX, screenY, 0, screenX, screenY, 600);
          g.addColorStop(0, `rgba(200, 230, 255, 0.3)`); g.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = g; ctx.beginPath(); ctx.moveTo(screenX, screenY);
          ctx.arc(screenX, screenY, 600, op.dir - currentFov/2, op.dir + currentFov/2); ctx.fill();
        }
      }
      if (serverWorld.fMarks) {
        for (let mk of serverWorld.fMarks) {
          let mx = mk.x - (playerX - width/2); let my = mk.y - (playerY - height/2);
          let g = ctx.createRadialGradient(mx, my, 0, mx, my, 350);
          g.addColorStop(0, 'rgba(0, 255, 255, 0.5)'); g.addColorStop(1, 'rgba(0, 0, 0, 0)');
          ctx.fillStyle = g; ctx.beginPath(); ctx.arc(mx, my, 350, 0, TWO_PI); ctx.fill();
        }
      }
      blendMode(BLEND);
    }

    function resolveCollision() {
      if (!isColliding(playerX, playerY)) return; 
      let found = false;
      for (let r = 2; r < 200; r += 5) { 
        for (let theta = 0; theta < TWO_PI; theta += PI / 8) {
          let tx = playerX + r * cos(theta); let ty = playerY + r * sin(theta);
          if (!isColliding(tx, ty) && dist(tx, ty, MAP_CENTER, MAP_CENTER) < MAP_RADIUS - playerRadius) {
            playerX = tx; playerY = ty; found = true; break;
          }
        }
        if (found) break;
      }
    }
    
    function handleInput() {
      if (isNaN(playerX)) playerX = MAP_CENTER;
      if (isNaN(playerY)) playerY = MAP_CENTER + MAP_RADIUS - 80;
      if (isNaN(playerDir)) playerDir = -Math.PI / 2;

      let dx = 0; let dy = 0; let ox = playerX; let oy = playerY;
      
      if (joyDx !== 0 || joyDy !== 0) {
          dx = joyDx * playerSpeed;
          dy = joyDy * playerSpeed;
      } else {
          if (activeKeys['arrowleft'] || activeKeys['a']) dx -= playerSpeed;
          if (activeKeys['arrowright'] || activeKeys['d']) dx += playerSpeed;
          if (activeKeys['arrowup'] || activeKeys['w']) dy -= playerSpeed;
          if (activeKeys['arrowdown'] || activeKeys['s']) dy += playerSpeed;
      }

      if (dx !== 0 || dy !== 0) targetDir = Math.atan2(dy, dx);
      let diff = targetDir - playerDir;
      while (diff < -Math.PI) diff += Math.PI * 2;
      while (diff > Math.PI) diff -= Math.PI * 2;
      playerDir += diff * 0.15;
      
      let nx = playerX + dx; let ny = playerY + dy;
      if (!isColliding(nx, playerY)) playerX = nx;
      if (!isColliding(playerX, ny)) playerY = ny;

      if (dist(playerX, playerY, MAP_CENTER, MAP_CENTER) > MAP_RADIUS + 15) {
        let a = Math.atan2(playerY - MAP_CENTER, playerX - MAP_CENTER);
        playerX = MAP_CENTER + Math.cos(a + Math.PI) * (MAP_RADIUS - 15);
        playerY = MAP_CENTER + Math.sin(a + Math.PI) * (MAP_RADIUS - 15);
        trail = [];
      }

      let m = dist(ox, oy, playerX, playerY);
      if (m > 0) {
        trail.push({x: playerX, y: playerY}); if (trail.length > 20) trail.shift();
        lastStepDistance += m;
        if (lastStepDistance > 35) {
          lastStepDistance = 0; let pa = playerDir + (Math.PI / 2) * stepToggle;
          let fx = playerX + Math.cos(pa) * 8; let fy = playerY + Math.sin(pa) * 8;
          socket.emit('footprint', { x: fx, y: fy, angle: playerDir });
          stepToggle *= -1;
        }
      } else if (trail.length > 0) trail.shift();
    }
    
    function isColliding(x, y) {
      if(!collisionPixels) return false;
      let rx = x - MAP_CENTER; let ry = y - MAP_CENTER;
      let ca = cos(-serverWorld.angle); let sa = sin(-serverWorld.angle);
      let cx = floor((rx * ca - ry * sa + MAP_CENTER) * COLLISION_SCALE);
      let cy = floor((rx * sa + ry * ca + MAP_CENTER) * COLLISION_SCALE);
      if (cx < 0 || cx >= collisionLayer.width || cy < 0 || cy >= collisionLayer.height) return false;
      return collisionPixels[(cx + cy * collisionLayer.width) * 4] > 128; 
    }
    
    function drawGridAndBoundary() {
      stroke(30); strokeWeight(2);
      for(let i = 0; i <= MAP_SIZE; i += 300) {
        if (abs(i - playerX) < width || fullVision) line(i, 0, i, MAP_SIZE);
        if (abs(i - playerY) < height || fullVision) line(0, i, MAP_SIZE, i);
      }
      stroke(150, 20, 20); strokeWeight(20); noFill(); circle(MAP_CENTER, MAP_CENTER, MAP_RADIUS * 2);
    }
    
    function drawStations() {
      for (let s of stations) {
        if (dist(playerX, playerY, s.x, s.y) < 250) battery = min(100, battery + 1.5);
        push(); translate(s.x, s.y);
        rotate(frameCount * 0.02);
        noFill(); strokeWeight(6); stroke(0, 255, 100, 80);
        drawingContext.setLineDash([30, 40]); circle(0, 0, 500); drawingContext.setLineDash([]);
        rotate(-frameCount * 0.05);
        fill(0, 255, 100, 200); noStroke();
        circle(120, 0, 15); circle(-120, 0, 15); circle(0, 120, 15); circle(0, -120, 15);
        let stPulse = map(sin(frameCount * 0.1), -1, 1, 80, 120);
        fill(0, 255, 100, 40); circle(0, 0, stPulse + 20); 
        fill(0, 255, 100, 100); circle(0, 0, stPulse); fill(255); circle(0, 0, stPulse * 0.3);
        pop();
      }
    }
    
    function drawMeteors() {
      if (!serverWorld.meteors) return;
      let now = serverWorld.serverTime;
      for (let m of serverWorld.meteors) {
        let age = now - m.startTime;
        let p = map(age, 0, m.duration, 1, 0);
        if (p > 0) {
          push(); translate(m.x, m.y);
          if (age < 1500) {
              let swRad = map(age, 0, 1500, 0, 500); let swAlpha = map(age, 0, 1500, 200, 0);
              noFill(); stroke(255, 200, 100, swAlpha); strokeWeight(4); circle(0, 0, swRad);
          }
          noStroke(); fill(255, 120, 50, 80 * p); circle(0, 0, 100 * p); 
          fill(255, 150, 50, 200 * p); circle(0, 0, 60 * p); 
          fill(255, 255, 200, 255 * p); circle(0, 0, 20 * p); 
          for(let i=0; i<8; i++) {
             let offX = sin(frameCount * 0.05 + i * 2) * 50 * p; let offY = cos(frameCount * 0.07 + i * 2) * 50 * p - (age * 0.05);
             fill(255, 200, 100, 180 * p); circle(offX, offY, 6 * p);
          }
          pop();
        }
      }
    }

    function drawTail() {
      blendMode(ADD); noStroke();
      for (let i = 0; i < trail.length; i++) {
        fill(255, 200, 100, lanternOn ? map(i, 0, trail.length, 0, 200) : map(i, 0, trail.length, 0, 80));
        circle(trail[i].x, trail[i].y, map(i, 0, trail.length, 2, playerRadius * 2.5));
      }
      blendMode(BLEND);
    }
    
    // ✨ 미니맵에도 동일한 지우개(Erase) 마법 적용 완료
    function drawRealtimeMinimap(lightRadius) {
      let mmSize = 220; let scale = mmSize / MAP_SIZE; let mmX = width - mmSize/2 - 30; let mmY = mmSize/2 + 30;
      push(); translate(mmX, mmY); 
      fill(10, 220); stroke(100); strokeWeight(2); circle(0, 0, mmSize);
      clip(() => { circle(0, 0, mmSize); });
      let ox = (playerX - MAP_CENTER) * scale; let oy = (playerY - MAP_CENTER) * scale;
      
      push(); rotate(serverWorld.angle);
      fill(255, 140); noStroke(); textAlign(CENTER, CENTER); 
      textSize(3500 * scale); text(serverWorld.targetWord, 0, 0); 
      pop();

      if (!fullVision) {
          if (!window.mmDark) window.mmDark = createGraphics(mmSize, mmSize);
          let md = window.mmDark;
          md.clear(); md.background(0);
          
          md.erase(); md.noStroke(); md.fill(255);

          if (lanternOn) md.arc(ox + mmSize/2, oy + mmSize/2, lightRadius * scale * 2, lightRadius * scale * 2, playerDir - currentFov/2, playerDir + currentFov/2, PIE);
          
          if (serverWorld.meteors) {
            for (let m of serverWorld.meteors) {
              let age = (serverWorld.serverTime || Date.now()) - m.startTime;
              let mRad = map(age, 0, m.duration, 800, 0) * scale;
              if (mRad > 0) {
                let mx = (m.x - MAP_CENTER) * scale + mmSize/2; let my = (m.y - MAP_CENTER) * scale + mmSize/2;
                md.circle(mx, my, mRad * 2);
              }
            }
          }
          if (serverWorld.fMarks) {
            for (let mk of serverWorld.fMarks) {
              let mx = (mk.x - MAP_CENTER) * scale + mmSize/2; let my = (mk.y - MAP_CENTER) * scale + mmSize/2;
              md.circle(mx, my, 350 * scale * 2);
            }
          }
          md.noErase();
          
          imageMode(CENTER);
          image(md, 0, 0);
          imageMode(CORNER);
      }

      for (let s of stations) { fill(255); textAlign(CENTER, CENTER); textSize(24); text("⚡", (s.x - MAP_CENTER) * scale, (s.y - MAP_CENTER) * scale); }
      
      if (serverWorld.meteors) {
        for (let m of serverWorld.meteors) {
          let mx = (m.x - MAP_CENTER) * scale; let my = (m.y - MAP_CENTER) * scale;
          fill(255, 100, 50); noStroke(); circle(mx, my, 8); fill(255, 255, 200); circle(mx, my, 4);
        }
      }

      if (serverWorld.fMarks) {
        for (let mk of serverWorld.fMarks) {
          let mx = (mk.x - MAP_CENTER) * scale; let my = (mk.y - MAP_CENTER) * scale;
          fill(0, 255, 255); noStroke(); circle(mx, my, 5);
        }
      }

      fill(255, 200, 0); noStroke(); circle(ox, oy, 7);
      
      for (let id in serverWorld.players) {
        if (id === socket.id) continue;
        let op = serverWorld.players[id];
        fill(op.color || '#ffffff'); noStroke(); circle((op.x - MAP_CENTER) * scale, (op.y - MAP_CENTER) * scale, 5);
      }
      pop();
    }
    
    function drawUI() {
      let msgOffset = 0;
      for (let i = sysMessages.length - 1; i >= 0; i--) {
        let msg = sysMessages[i];
        fill(255, 200, 150, msg.alpha); noStroke(); textAlign(CENTER, CENTER); textSize(18);
        text(msg.text, width/2, msg.y - msgOffset);
        msg.y -= 0.5; msg.alpha -= 1.5; msgOffset += 25; 
        if (msg.alpha <= 0) sysMessages.splice(i, 1);
      }
      
      let me = serverWorld.players[socket.id];
      let fCount = me ? (me.fCount || 0) : 0;
      let pCount = Object.keys(serverWorld.players).length;

      textAlign(LEFT, TOP); textSize(15);
      fill(255); noStroke(); text(`방: ${myRoom}  |  현재 탐험가: ${pCount}명`, 30, 30);
      
      fill(30, 200); stroke(100); rect(30, 55, 300, 18, 5);
      if (battery > 50) fill(0, 255, 100); else if (battery > 20) fill(255, 200, 0); else fill(map(sin(frameCount * 3.0), -1, 1, 150, 255), 50, 50); 
      rect(30, 55, map(battery, 0, 100, 0, 300), 18, 5);
      fill(255); noStroke(); text(lanternOn ? "랜턴 배터리 (Z키: 끄기)" : "랜턴 꺼짐 (Z키: 켜기)", 30, 80);
      
      fill(0, 255, 255); noStroke(); text(`형광물질 (X키: 붓칠): ${fCount}개`, 30, 105);

      let elapsed = ((serverWorld.serverTime - (serverWorld.gameStartTime || serverWorld.serverTime)) / 1000).toFixed(1);
      fill(255, 200, 0); noStroke(); text(`⏱ 흐르는 시간: ${elapsed}초`, 30, 130);
    }
    
    function windowResized() { 
        resizeCanvas(windowWidth, windowHeight); 
        if(darknessLayer) {
            darknessLayer.remove();
            darknessLayer = createGraphics(windowWidth, windowHeight);
        }
    }
  </script>
</body>
